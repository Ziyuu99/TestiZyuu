<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
  <h2 class="text-lg font-bold mb-4">Berikan Testimoni</h2>
  <div class="space-y-3">
    <input id="input-nama" type="text" class="w-full border rounded-lg p-2" placeholder="Nama Anda">
    <input id="input-rating" type="number" min="1" max="5" class="w-full border rounded-lg p-2" placeholder="Rating (1-5)">
    <textarea id="input-kritsar" class="w-full border rounded-lg p-2" placeholder="Tulis testimoni..."></textarea>
    <button onclick="kirimBaru()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg">Kirim Testimoni</button>
  </div>
</div>

<div id="container" class="space-y-6">
  </div>

<script>
  // Di dalam fungsi load(), tambahkan bagian ini untuk menampilkan nama dan balasan:
  container.innerHTML = data.map(item => `
    <div class="bg-white rounded-2xl p-5 shadow-sm border">
      <p class="font-bold text-blue-600">👤 ${item.nama_pembeli || 'Anonim'}</p>
      <img src="${item.photo_url}" class="w-full h-64 object-cover rounded-lg my-3">
      <p class="text-slate-700 italic">"${item.kritsar}"</p>
      
      ${item.balasan_admin ? 
        `<div class="mt-3 p-3 bg-slate-100 rounded-lg text-sm text-slate-800">
           <strong>Admin:</strong> ${item.balasan_admin}
         </div>` : 
        `<button onclick="balas('${item.id}')" class="text-xs text-blue-500 mt-2">Balas Review</button>`
      }
    </div>
  `).join('');
</script>
