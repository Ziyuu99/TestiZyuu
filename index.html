<!DOCTYPE html>
<html>
<body>
  <h2>Galeri Testimoni</h2>
  <div id="container">Loading...</div>
  <script>
    async function load() {
      const res = await fetch('/api/data');
      const data = await res.json();
      document.getElementById('container').innerHTML = data.map(item => `
        <div style="border:1px solid #ccc; padding:10px; margin:10px;">
          <img src="${item.photo_url}" width="200"><br>
          ${item.rating ? `⭐ ${item.rating} - ${item.kritsar}` : 
          `<input id="r-${item.id}" type="number" placeholder="Rating 1-5">
           <input id="k-${item.id}" placeholder="Kritik Saran">
           <button onclick="kirim('${item.id}')">Kirim</button>`}
          <br><button onclick="hapus('${item.id}')">Hapus (Admin)</button>
        </div>`).join('');
    }
    async function kirim(id) {
      await fetch('/api/data', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, rating: document.getElementById('r-'+id).value, kritsar: document.getElementById('k-'+id).value})});
      load();
    }
    async function hapus(id) {
      const p = prompt('Password?');
      await fetch('/api/data', {method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({id, password: p})});
      load();
    }
    load();
  </script>
</body>
</html>
