<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimoni Pelanggan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

  <div class="max-w-md mx-auto p-4 mt-6">
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <h2 class="text-lg font-bold mb-4">Berikan Testimoni</h2>
      <div class="space-y-3">
        <input id="input-rating" type="number" min="1" max="5" class="w-full border rounded-lg p-2" placeholder="Rating (1-5)">
        <textarea id="input-kritsar" class="w-full border rounded-lg p-2" placeholder="Tulis kritik & saran..."></textarea>
        <button onclick="kirimBaru()" class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition">Kirim Testimoni</button>
      </div>
    </div>
  </div>

  <div class="max-w-md mx-auto p-4 space-y-6">
    <h2 class="text-lg font-bold text-slate-800">Galeri Pelanggan</h2>
    <div id="container" class="space-y-6">
      <p class="text-center text-slate-500">Memuat testimoni...</p>
    </div>
  </div>

  <script>
    async function load() {
      const res = await fetch('/api/data');
      const data = await res.json();
      const container = document.getElementById('container');
      
      container.innerHTML = data.map(item => `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
          <img src="${item.photo_url}" class="w-full h-72 object-cover">
          <div class="p-5">
            ${item.rating ? 
              `<div class="text-yellow-500 font-bold mb-2">⭐ ${item.rating} / 5</div>
               <p class="text-slate-700 italic">"${item.kritsar}"</p>` : ''}
            <button onclick="hapus('${item.id}')" class="w-full text-slate-300 text-[10px] mt-4 hover:text-red-500 uppercase">Hapus</button>
          </div>
        </div>
      `).join('');
    }

    // Fungsi kirim baru akan menangani data tanpa foto di form, 
    // namun sistem bot kita sudah menaruh foto terlebih dahulu.
    async function hapus(id) {
      const password = prompt('Password Admin:');
      if(!password) return;
      await fetch('/api/data', { method: 'DELETE', headers: {'Content-Type':'application/json'}, body: JSON.stringify({id, password}) });
      load();
    }
    load();
  </script>
</body>
</html>
