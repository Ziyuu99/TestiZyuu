<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimoni Pelanggan</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen pb-20">

  <header class="bg-white shadow-sm p-6 text-center border-b border-slate-100">
    <h1 class="text-2xl font-black text-slate-800 tracking-tight">TESTIMONI</h1>
    <p class="text-slate-400 text-sm mt-1">Hasil nyata dari pelanggan kami</p>
  </header>

  <main class="max-w-md mx-auto p-4 space-y-8">
    
    <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100">
      <h2 class="text-lg font-bold mb-4 text-slate-800">Tulis Testimoni Anda</h2>
      <div class="space-y-4">
        <input id="input-nama" type="text" class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-blue-500" placeholder="Nama Anda">
        <input id="input-rating" type="number" min="1" max="5" class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-blue-500" placeholder="Rating (1-5)">
        <textarea id="input-kritsar" class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-blue-500" rows="3" placeholder="Apa pendapat Anda?"></textarea>
        <button onclick="kirimBaru()" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition">Kirim Testimoni</button>
      </div>
    </div>

    <div id="container" class="space-y-6"></div>
  </main>

  <a href="https://wa.me/6285892104125" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-xl hover:bg-green-600 transition">
    <i class="fab fa-whatsapp text-2xl"></i>
  </a>

  <footer class="text-center pt-10 border-t mt-10">
    <p class="text-slate-400 text-sm">Store Official</p>
    <p class="font-bold text-slate-600 text-lg">@ZirenéStore</p>
  </footer>

  <script>
    async function load() {
      const res = await fetch('/api/data');
      const data = await res.json();
      document.getElementById('container').innerHTML = data.map(item => `
        <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
          <p class="font-bold text-slate-900">👤 ${item.nama_pembeli || 'Pelanggan'}</p>
          <img src="${item.photo_url}" class="w-full h-72 object-cover rounded-2xl my-4">
          <p class="text-slate-600 italic">"${item.kritsar}"</p>
          ${item.balasan_admin ? `<div class="mt-3 p-3 bg-slate-50 rounded-xl text-sm border-l-4 border-blue-500"><strong>Admin:</strong> ${item.balasan_admin}</div>` : ''}
        </div>
      `).join('');
    }
    load();
  </script>
</body>
                              </html>
